<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter for You</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Georgia, serif;
  background:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

.hearts-container {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.heart {
  position:absolute;
  bottom:-50px;
  animation:floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:0.7; }
  100% { transform:translateY(-110vh); opacity:0; }
}

#landing {
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  gap:22px;
  padding:20px;
}

.main-title {
  font-size:clamp(2rem, 5vw, 3.8rem);
  color:#7B2CBF;
  font-style:italic;
  font-weight:bold;
  text-align:center;
  text-shadow:0 2px 3px rgba(123,44,191,0.15);
}

.envelope-wrapper {
  cursor:pointer;
  width:min(460px, 86vw);
  height:280px;
  position:relative;
  filter:drop-shadow(0 25px 18px rgba(60,20,120,0.25));
  transition:transform 0.25s ease;
}

.envelope-wrapper:hover {
  transform:translateY(-5px);
}

.envelope-body {
  position:absolute;
  bottom:0;
  width:100%;
  height:230px;
  background:linear-gradient(145deg,#b18bdd,#8f63c7);
  border:8px solid #3B176F;
  border-radius:18px;
  overflow:hidden;
}

.envelope-body::before {
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(35deg, transparent 49%, #3B176F 50%, transparent 52%),
    linear-gradient(-35deg, transparent 49%, #3B176F 50%, transparent 52%);
  opacity:0.95;
}

.envelope-flap {
  position:absolute;
  top:50px;
  left:8px;
  width:calc(100% - 16px);
  height:145px;
  background:linear-gradient(160deg,#b999e3,#9d77d0);
  clip-path:polygon(0 0,100% 0,50% 92%);
  z-index:4;
  transform-origin:top;
  transition:transform 0.8s ease;
}

.envelope-flap.open {
  transform:rotateX(180deg);
}

.seal {
  position:absolute;
  top:145px;
  left:50%;
  transform:translate(-50%,-50%);
  width:62px;
  height:62px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ff6ccf, #db2777 65%, #9d174d);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  z-index:6;
}

.shine1, .shine2 {
  position:absolute;
  background:rgba(255,255,255,0.75);
  border-radius:50%;
  z-index:7;
}

.shine1 {
  width:30px;
  height:18px;
  top:45px;
  left:38px;
}

.shine2 {
  width:36px;
  height:22px;
  top:135px;
  left:30px;
}

.subtitle {
  font-size:clamp(1.4rem, 4vw, 2.1rem);
  color:#7B2CBF;
  font-weight:bold;
  letter-spacing:3px;
  text-align:center;
}

.click-hint {
  font-size:1rem;
  color:#8E44AD;
}

#letter-page {
  display:none;
  padding:50px 20px;
  color:#6B21A8;
  text-align:center;
}

audio {
  display:none;
}
</style>
</head>

<body>

<div class="hearts-container" id="hearts"></div>

<div id="landing">
  <div class="main-title">Hi Jana, This is Menghorng 🤍</div>

  <div class="envelope-wrapper" onclick="openEnvelope()">
    <div class="envelope-body"></div>
    <div class="envelope-flap" id="flap"></div>
    <div class="shine1"></div>
    <div class="shine2"></div>
    <div class="seal" id="seal">💜</div>
  </div>

  <div class="subtitle">I have something to tell you</div>
  <div class="click-hint">✦ click the envelope ✦</div>
</div>

<div id="letter-page">
  <h2>Dear Jana 💜</h2>
  <p>Your message continues here...</p>
</div>

<audio id="bgAudio" loop preload="auto">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const container = document.getElementById('hearts');
const emojis = ['💜','🤍','💕','✨'];

for (let i = 0; i < 16; i++) {
  const el = document.createElement('div');
  el.className = 'heart';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = Math.random() * 1.4 + 1 + 'rem';
  el.style.animationDuration = Math.random() * 8 + 7 + 's';
  el.style.animationDelay = Math.random() * 6 + 's';
  container.appendChild(el);
}

let opened = false;

function openEnvelope() {
  if (opened) return;
  opened = true;

  document.getElementById('flap').classList.add('open');
  document.getElementById('seal').style.opacity = '0';

  const audio = document.getElementById('bgAudio');
  audio.volume = 0.7;
  audio.play().catch(e => console.log("Audio blocked:", e));

  setTimeout(() => {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('letter-page').style.display = 'block';
  }, 1500);
}
</script>

</body>
</html>
