<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter for You</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Georgia, serif;
  background:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* Floating hearts */
.hearts-container {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:0;
}

.heart {
  position:absolute;
  bottom:-50px;
  animation:floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform:translateY(0); opacity:0.7; }
  100% { transform:translateY(-110vh); opacity:0; }
}

/* Landing */
#landing {
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  gap:24px;
}

.main-title {
  font-size:2rem;
  color:#6B21A8;
  font-style:italic;
  text-align:center;
}

.subtitle {
  color:#6B21A8;
}

.click-hint {
  font-size:0.85rem;
  color:#6B21A8;
}

/* Envelope */
.envelope-wrapper {
  cursor:pointer;
  width:300px;
  height:200px;
  position:relative;
}

.envelope-body {
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#B794D9,#8D68BF);
  border-radius:14px;
}

.envelope-flap {
  position:absolute;
  top:0;
  width:100%;
  height:100px;
  background:#9B75C6;
  transform-origin:top;
  transition:0.7s;
}

.envelope-flap.open {
  transform:rotateX(180deg);
}

/* Letter page */
#letter-page {
  display:none;
  padding:40px;
}

audio {
  display:none; /* 👈 hidden but still plays */
}
</style>
</head>

<body>

<div class="hearts-container" id="hearts"></div>

<div id="landing">
  <div class="main-title">Hi Jana, This is Menghorng 🤍</div>

  <div class="envelope-wrapper" onclick="openEnvelope()">
    <div class="envelope-body"></div>
    <div class="envelope-flap" id="flap"></div>
  </div>

  <div class="subtitle">I have something to tell you</div>
  <div class="click-hint">✦ click the envelope ✦</div>
</div>

<div id="letter-page">
  <h2>Dear Jana 💜</h2>
  <p>Your message continues here...</p>
</div>

<!-- AUDIO (hidden) -->
<audio id="bgAudio" loop preload="auto">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const container = document.getElementById('hearts');
const emojis = ['💜','🤍','💕','✨'];

for (let i=0;i<20;i++){
  const el=document.createElement('div');
  el.className='heart';
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.animationDuration=(Math.random()*8+6)+'s';
  container.appendChild(el);
}

let opened=false;

function openEnvelope(){
  if(opened) return;
  opened=true;

  document.getElementById('flap').classList.add('open');

  const audio=document.getElementById('bgAudio');
  audio.volume=0.7;

  audio.play().catch(e=>{
    console.log("Audio blocked:", e);
  });

  setTimeout(()=>{
    document.getElementById('landing').style.display='none';
    document.getElementById('letter-page').style.display='block';
  },1500);
}
</script>

</body>
</html>
